# Lumen Bridge for Linux — example configuration (v0.3.0).
# Copy to ./config.yaml or /etc/lumen-bridge/config.yaml and edit.
# Every field is overridable via env var (LB_*). Env wins over file.

mqtt:
  # Frigate's MQTT broker. This is your Mosquitto / EMQX / VerneMQ —
  # NOT the Frigate web host. Look at frigate.yml `mqtt.host` to find it.
  host: 192.168.1.50
  port: 1883
  # Set tls: true and port: 8883 for TLS brokers.
  tls: false
  # Optional. Empty = anonymous (Mosquitto default with allow_anonymous=true).
  username: frigate
  password: change-me
  # Frigate's default — change only if you've customised topic_prefix in frigate.yml.
  topic_prefix: frigate
  # Used as the MQTT client ID. Make it unique if you run multiple bridges
  # against the same broker.
  client_id: lumen-bridge-linux

relay:
  # Lumen Bridge Relay Worker. Don't change unless you're self-hosting
  # the relay against your own CloudKit container.
  url: https://relay.lorislab.fr
  # Where the device token (obtained via `lumen-bridge pair --code <6-digit>`
  # after generating a code in the Lumen iOS app) is cached. Defaults to
  # ~/.config/lumen-bridge/device-token.json — set explicitly here if you
  # run as a service user with a non-default home dir.
  device_token_path: ~/.config/lumen-bridge/device-token.json

# Optional. Set to enable clip-MP4 backfill on event-end. Without this,
# events still forward with their snapshot but the iOS clients won't see
# the recorded video. Should point to your Frigate web UI host (port 5000
# by default).
# (Phase 2.5: clip backfill is currently a no-op pending the Worker's
# signed-URL proxy. Snapshots are deferred to the same phase.)
frigate:
  base_url: http://192.168.1.50:5000
